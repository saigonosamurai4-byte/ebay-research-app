<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>eBay仕入れ入力</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 20px 16px; }
h1 { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 20px; text-align: center; }
.card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 600; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
input { width: 100%; padding: 14px 16px; border: 2px solid #e8e8e8; border-radius: 12px; font-size: 16px; color: #1a1a2e; background: #fafafa; -webkit-appearance: none; }
input:focus { outline: none; border-color: #4f46e5; background: white; }
.site-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 8px; }
.site-mercari { background: #fff0f0; color: #e74c3c; }
.site-yahoo { background: #fff8e1; color: #f39c12; }
.site-rakuma { background: #f0f4ff; color: #4f46e5; }
.site-trefac { background: #f0fff4; color: #27ae60; }
.site-other { background: #f5f5f5; color: #666; }
.price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
.price-display { background: #f8f9ff; border: 2px solid #e8e8e8; border-radius: 12px; padding: 14px 16px; }
.price-display .value { font-size: 20px; font-weight: 700; color: #4f46e5; }
.price-display .unit { font-size: 12px; color: #999; margin-top: 2px; }
.assignee-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
.assignee-btn { padding: 14px 8px; border: 2px solid #e8e8e8; border-radius: 12px; background: white; font-size: 14px; font-weight: 600; color: #666; cursor: pointer; -webkit-appearance: none; }
.assignee-btn.active { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border-color: transparent; box-shadow: 0 4px 10px rgba(79,70,229,0.3); }
.btn-submit { width: 100%; padding: 18px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 8px; box-shadow: 0 4px 15px rgba(79,70,229,0.4); }
.btn-submit:disabled { opacity: 0.6; }
.success-msg { display: none; background: #f0fff4; border: 2px solid #27ae60; border-radius: 12px; padding: 16px; text-align: center; color: #27ae60; font-weight: 600; margin-top: 12px; }
.error-msg { display: none; background: #fff0f0; border: 2px solid #e74c3c; border-radius: 12px; padding: 16px; text-align: center; color: #e74c3c; font-weight: 600; margin-top: 12px; }
.spinner { display: none; text-align: center; padding: 12px; color: #4f46e5; font-weight: 600; }
</style>
</head>
<body>
<h1>📦 eBay仕入れ入力</h1>
<div class="card">
  <label>商品URL</label>
  <input type="url" id="url" placeholder="https://jp.mercari.com/item/..." oninput="detectSite()" autocomplete="off">
  <div id="site-badge"></div>
</div>
<div class="card">
  <label>仕入れ価格（円）</label>
  <input type="number" id="price" placeholder="例: 8500" oninput="calcSellPrice()" inputmode="numeric">
  <div class="price-row">
    <div>
      <label style="font-size:11px;">販売価格（USD）</label>
      <div class="price-display"><div class="value" id="sell-usd">-</div><div class="unit">自動計算</div></div>
    </div>
    <div>
      <label style="font-size:11px;">推定利益（円）</label>
      <div class="price-display"><div class="value" id="profit-jpy">-</div><div class="unit">約30%</div></div>
    </div>
  </div>
</div>
<div class="card">
  <label>担当外注</label>
  <div class="assignee-buttons">
    <button class="assignee-btn active" id="btn-auto" onclick="selectAssignee('auto')">自動</button>
    <button class="assignee-btn" id="btn-mile" onclick="selectAssignee('ミレ')">ミレ</button>
    <button class="assignee-btn" id="btn-mai" onclick="selectAssignee('マイ')">マイ</button>
    <button class="assignee-btn" id="btn-an" onclick="selectAssignee('アン')">アン</button>
  </div>
</div>
<button class="btn-submit" id="submit-btn" onclick="submitForm()">スプレッドシートに入力する</button>
<div class="spinner" id="spinner">⏳ 送信中...</div>
<div class="success-msg" id="success-msg">✅ スプレッドシートに入力しました！</div>
<div class="error-msg" id="error-msg">❌ エラーが発生しました。</div>
<iframe id="gas-frame" style="display:none;" width="1" height="1"></iframe>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxci76rSV3KA3eG0eWPZyKZN90lOjp3Mf1WGupKwGvUzSCIfVnYbBMxj1B0SeMDuAcY/exec';
const ASSIGNEES = ['ミレ', 'マイ', 'アン'];
const EC_CODES = {'amazon':1,'mercari':2,'yahoo_fril':3,'yahoo_shop':4,'rakuten':5,'mercari_shops':6,'rakuma':7,'yahoo':8,'netmall':9,'suruga':10,'pokemon':11,'disney':12,'geo':13,'digimart':14,'trefac_general':15,'2ndstreet':16,'mandarake':17,'kojima':18,'eearphone':19,'sorano':20,'trefac':21,'kindal':22,'kaitori':23,'bape':24,'ragtag':25,'kosho':26,'offmall':27,'other':2};
const SHEETS = {
  'ミレ': {id:'1mDeTde1hwBFDkVbKtzMs23AIDBktc_1nQwa8HP_eiyY'},
  'マイ': {id:'1qlhoQ7JSg8M9HvMuav3okNsEOTgHMeyXVyJaBQWtiF4'},
  'アン': {id:'103190DNb273QFRTObA84zBztOXFVOF0zh9jyx1794_g'}
};
let currentAssigneeIndex = parseInt(localStorage.getItem('assigneeIndex') || '0');
let selectedAssignee = 'auto';
let detectedSite = 'other';

function selectAssignee(name) {
  selectedAssignee = name;
  document.getElementById('btn-auto').classList.remove('active');
  document.getElementById('btn-mile').classList.remove('active');
  document.getElementById('btn-mai').classList.remove('active');
  document.getElementById('btn-an').classList.remove('active');
  if (name === 'auto') document.getElementById('btn-auto').classList.add('active');
  else if (name === 'ミレ') document.getElementById('btn-mile').classList.add('active');
  else if (name === 'マイ') document.getElementById('btn-mai').classList.add('active');
  else if (name === 'アン') document.getElementById('btn-an').classList.add('active');
}

function detectSite() {
  const url = document.getElementById('url').value;
  const badge = document.getElementById('site-badge');
  if (url.includes('amazon.')) { detectedSite='amazon'; badge.innerHTML='<span class="site-badge site-other">📦 Amazon</span>'; }
  else if (url.includes('mercari.com/shops')) { detectedSite='mercari_shops'; badge.innerHTML='<span class="site-badge site-mercari">🛍 メルカリShops</span>'; }
  else if (url.includes('mercari.com')) { detectedSite='mercari'; badge.innerHTML='<span class="site-badge site-mercari">🛍 メルカリ</span>'; }
  else if (url.includes('paypayfleamarket')||url.includes('paypay-fleamarket')) { detectedSite='yahoo_fril'; badge.innerHTML='<span class="site-badge site-yahoo">🟡 Yahoo!フリマ</span>'; }
  else if (url.includes('shopping.yahoo')) { detectedSite='yahoo_shop'; badge.innerHTML='<span class="site-badge site-yahoo">🟡 Yahoo!ショッピング</span>'; }
  else if (url.includes('rakuten.co.jp/')&&!url.includes('fril')) { detectedSite='rakuten'; badge.innerHTML='<span class="site-badge site-other">🔴 楽天市場</span>'; }
  else if (url.includes('fril.jp')||url.includes('rakuma')) { detectedSite='rakuma'; badge.innerHTML='<span class="site-badge site-rakuma">💜 ラクマ</span>'; }
  else if (url.includes('auctions.yahoo')||url.includes('aucfan')) { detectedSite='yahoo'; badge.innerHTML='<span class="site-badge site-yahoo">🟡 ヤフオク</span>'; }
  else if (url.includes('netmall.hardoff')) { detectedSite='offmall'; badge.innerHTML='<span class="site-badge site-other">⚫ オフモール</span>'; }
  else if (url.includes('suruga-ya')) { detectedSite='suruga'; badge.innerHTML='<span class="site-badge site-other">🟢 駿河屋</span>'; }
  else if (url.includes('pokemoncenter-online')) { detectedSite='pokemon'; badge.innerHTML='<span class="site-badge site-other">🔴 ポケモンセンター</span>'; }
  else if (url.includes('disneystore')||url.includes('shopdisney')) { detectedSite='disney'; badge.innerHTML='<span class="site-badge site-other">💙 ディズニー</span>'; }
  else if (url.includes('geo-online')||url.includes('ec.geo-online')) { detectedSite='geo'; badge.innerHTML='<span class="site-badge site-other">🔵 GEO</span>'; }
  else if (url.includes('digimart')) { detectedSite='digimart'; badge.innerHTML='<span class="site-badge site-other">🎸 デジマート</span>'; }
  else if (url.includes('trefac.jp')) { detectedSite='trefac'; badge.innerHTML='<span class="site-badge site-trefac">🟢 TREFAC FASHION</span>'; }
  else if (url.includes('treasure-f.com')) { detectedSite='trefac_general'; badge.innerHTML='<span class="site-badge site-trefac">🟢 トレファク</span>'; }
  else if (url.includes('2ndstreet')) { detectedSite='2ndstreet'; badge.innerHTML='<span class="site-badge site-other">🔵 セカスト</span>'; }
  else if (url.includes('mandarake')) { detectedSite='mandarake'; badge.innerHTML='<span class="site-badge site-other">⚫ まんだらけ</span>'; }
  else if (url.includes('kojima.net')) { detectedSite='kojima'; badge.innerHTML='<span class="site-badge site-other">🔵 コジマ</span>'; }
  else if (url.includes('e-earphone')) { detectedSite='eearphone'; badge.innerHTML='<span class="site-badge site-other">🎧 eイヤホン</span>'; }
  else if (url.includes('sorano-ueten')) { detectedSite='sorano'; badge.innerHTML='<span class="site-badge site-other">☁️ そらのうえ店</span>'; }
  else if (url.includes('kind.al')||url.includes('kindal.jp')) { detectedSite='kindal'; badge.innerHTML='<span class="site-badge site-other">⚫ Kindal</span>'; }
  else if (url.includes('kaitori-okoku')||url.includes('okoku.jp')) { detectedSite='kaitori'; badge.innerHTML='<span class="site-badge site-other">👑 買取王国</span>'; }
  else if (url.includes('bape.com')) { detectedSite='bape'; badge.innerHTML='<span class="site-badge site-other">🦍 BAPE</span>'; }
  else if (url.includes('ragtag')) { detectedSite='ragtag'; badge.innerHTML='<span class="site-badge site-other">🔴 RAGTAG</span>'; }
  else if (url.includes('kosho.or.jp')) { detectedSite='kosho'; badge.innerHTML='<span class="site-badge site-other">📚 日本の古本屋</span>'; }
  else if (url.includes('offmall')||url.includes('off-mall')) { detectedSite='offmall'; badge.innerHTML='<span class="site-badge site-other">⚫ オフモール</span>'; }
  else if (url.length>5) { detectedSite='other'; badge.innerHTML='<span class="site-badge site-other">🌐 その他</span>'; }
  else { badge.innerHTML=''; }
}

function calcSellPrice() {
  const price = parseFloat(document.getElementById('price').value);
  if (!price) { document.getElementById('sell-usd').textContent='-'; document.getElementById('profit-jpy').textContent='-'; return; }
  const sellJpy = price/0.7;
  const sellUsd = Math.round((sellJpy+5000)/158/0.87*100)/100;
  document.getElementById('sell-usd').textContent='$'+sellUsd.toFixed(2);
  document.getElementById('profit-jpy').textContent='¥'+Math.round(sellJpy-price).toLocaleString();
}

function extractUrl(text) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  const match = text.match(urlRegex);
  return match ? match[0] : text;
}

function submitForm() {
  let url = document.getElementById('url').value.trim();
  url = extractUrl(url);
  const price = document.getElementById('price').value.trim();
  if (!url || !price) { alert('URLと仕入れ価格を入力してください'); return; }
  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const successMsg = document.getElementById('success-msg');
  const errorMsg = document.getElementById('error-msg');
  btn.disabled = true;
  spinner.style.display = 'block';
  successMsg.style.display = 'none';
  errorMsg.style.display = 'none';
  
  let assigneeName;
  if (selectedAssignee === 'auto') {
    assigneeName = ASSIGNEES[currentAssigneeIndex % ASSIGNEES.length];
    currentAssigneeIndex++;
    localStorage.setItem('assigneeIndex', currentAssigneeIndex);
  } else {
    assigneeName = selectedAssignee;
  }
  
  const sheet = SHEETS[assigneeName];
  const ecCode = EC_CODES[detectedSite] || 2;
  const sellUsd = parseFloat(document.getElementById('sell-usd').textContent.replace('$','')) || 0;
  const params = new URLSearchParams({
    spreadsheetId: sheet.id,
    url: url,
    ecCode: ecCode,
    price: parseInt(price),
    sellUsd: sellUsd,
    assignee: assigneeName
  });
  const gasUrl = GAS_URL + '?' + params.toString();
  document.getElementById('gas-frame').src = gasUrl;
  setTimeout(function() {
    spinner.style.display = 'none';
    successMsg.innerHTML = '✅ ' + assigneeName + 'のシートに入力しました！';
    successMsg.style.display = 'block';
    btn.disabled = false;
    document.getElementById('url').value = '';
    document.getElementById('price').value = '';
    document.getElementById('site-badge').innerHTML = '';
    document.getElementById('sell-usd').textContent = '-';
    document.getElementById('profit-jpy').textContent = '-';
    setTimeout(function() { successMsg.style.display = 'none'; }, 3000);
  }, 3000);
}
</script>
</body>
</html>
